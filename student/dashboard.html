<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard — QazTU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/app.css" />
  </head>
  <body data-role="student" data-page="dashboard.html">
    <div class="app-shell">
      <div id="sidebar-root"></div>
      <div class="main-wrap">
        <div id="topbar-root"></div>
        <main class="main-content">
          <div class="dashboard-grid-3">
            <div class="card rounded-2xl card-body">
              <div class="icon-circle icon-circle--blue" style="margin-bottom:1rem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/></svg>
              </div>
              <h3>My Courses</h3>
              <p class="text-sm mt-2">6 active courses this semester</p>
              <a href="courses.html" class="btn btn-primary rounded-xl mt-4">View courses</a>
            </div>
            <div class="card rounded-2xl card-body">
              <div class="icon-circle icon-circle--green" style="margin-bottom:1rem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/></svg>
              </div>
              <h3>GPA</h3>
              <p class="h2 mt-2">3.72</p>
              <a href="grades.html" class="btn btn-secondary rounded-xl mt-4">View grades</a>
            </div>
            <div class="card rounded-2xl card-body">
              <div class="icon-circle icon-circle--purple" style="margin-bottom:1rem">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/></svg>
              </div>
              <h3>Today's Schedule</h3>
              <p class="text-sm mt-2">Database Systems · 10:00 AM</p>
              <a href="schedule.html" class="btn btn-secondary rounded-xl mt-4">Full schedule</a>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/nav-config-student.js"></script>
    <script src="../assets/js/app-shell.js"></script>
  </body>
</html>
